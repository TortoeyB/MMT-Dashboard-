name: Update dashboard data

on:
  schedule:
    - cron: "30 21 * * 1-5"   # หลังตลาด US ปิด ~04:30 เช้าเวลาไทย
  workflow_dispatch: {}        # กดรันเองได้

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - run: python scripts/run_daily.py --force
      - name: Commit updated data
        run: |
          git config user.name "rrg-bot"
          git config user.email "actions@github.com"
          git add docs/data.json backup/
          git diff --cached --quiet || git commit -m "data: update $(date -u +%F)"
          git push
